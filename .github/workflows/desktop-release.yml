name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0) — updates package.json before build'
        required: false
        type: string

# Prevent multiple simultaneous release runs on the same tag
concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

# Required for creating releases and uploading assets
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_cmd: package:mac
          - os: windows-latest
            platform: win
            build_cmd: package:win
          - os: ubuntu-latest
            platform: linux
            build_cmd: package:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Optional: bump version in package.json if triggered manually with a version input
      - name: Set version (manual trigger only)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          cd desktop
          npm version ${{ inputs.version }} --no-git-tag-version

      # Linux only: install native deps for electron-builder
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y icnsutils graphicsmagick

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package desktop app (${{ matrix.platform }})
        working-directory: ./desktop
        env:
          # macOS code signing — only needed if you have these secrets set up
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Windows code signing — only needed if you have these secrets set up
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run ${{ matrix.build_cmd }}

      - name: Upload artifacts (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 7
          path: |
            desktop/release/**/*.exe
            desktop/release/**/*.dmg
            desktop/release/**/*.AppImage
            desktop/release/**/*.zip
            desktop/release/**/*.yml
            desktop/release/**/*.yaml

  release:
    needs: build
    runs-on: ubuntu-latest
    # Run on tag push OR manual dispatch — not just tags
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts (debug)
        run: find ./artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/**/*.exe
            ./artifacts/**/*.dmg
            ./artifacts/**/*.AppImage
            ./artifacts/**/*.zip
            ./artifacts/**/*.yml
            ./artifacts/**/*.yaml
          draft: true
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
