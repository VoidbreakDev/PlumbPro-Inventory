appId: com.plumbpro.inventory
productName: PlumbPro Inventory
copyright: Copyright (c) 2026 PlumbPro

directories:
  output: release/${version}
  buildResources: resources

files:
  - dist/**/*
  - node_modules/**/*

extraResources:
  - from: dist/renderer
    to: frontend
    filter:
      - "**/*"
  - from: ../server/dist
    to: server
    filter:
      - "**/*"
      - "!**/.env"

asar: true
compression: maximum

# Windows configuration
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerHeaderIcon: resources/icons/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PlumbPro Inventory
  deleteAppDataOnUninstall: false

# macOS configuration
mac:
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  icon: resources/icons/icon.icns
  category: public.app-category.business
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: PlumbPro-Inventory-${version}-${arch}.${ext}
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux configuration (for future use)
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icons/icon.png
  category: Office
  artifactName: ${productName}-${version}.${ext}

# Publishing to GitHub Releases
publish:
  provider: github
  owner: VoidbreakDev
  repo: PlumbPro-Inventory
  releaseType: release
  vPrefixedTagName: true

# Auto-update configuration
electronUpdaterCompatibility: ">=2.16"

# Generate update info files
generateUpdatesFilesForAllChannels: true
