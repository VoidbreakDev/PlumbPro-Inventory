<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlumbPro Inventory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    .logo-container {
      margin-bottom: 40px;
      animation: fadeIn 0.5s ease-out;
    }

    .logo {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo svg {
      width: 80px;
      height: 80px;
      color: #2563eb;
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      animation: fadeIn 0.5s ease-out 0.2s backwards;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 40px;
      animation: fadeIn 0.5s ease-out 0.3s backwards;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease-out 0.4s backwards;
    }

    .loader {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .loader-bar {
      width: 40%;
      height: 100%;
      background: white;
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    .status {
      font-size: 13px;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      50% {
        transform: translateX(150%);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    .version {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo">
      <!-- Wrench/Pipe icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
  </div>

  <h1 class="title">PlumbPro Inventory</h1>
  <p class="subtitle">Professional Inventory Management</p>

  <div class="loader-container">
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
    <p class="status" id="status">Starting application...</p>
  </div>

  <p class="version" id="version"></p>

  <script>
    // Update status messages
    const statuses = [
      'Starting application...',
      'Initializing server...',
      'Loading components...',
      'Almost ready...'
    ];

    let statusIndex = 0;
    const statusEl = document.getElementById('status');

    setInterval(() => {
      statusIndex = (statusIndex + 1) % statuses.length;
      statusEl.textContent = statuses[statusIndex];
    }, 1500);

    // Get version from Electron if available
    if (window.electronAPI) {
      window.electronAPI.getAppVersion().then(version => {
        document.getElementById('version').textContent = `v${version}`;
      });
    }
  </script>
</body>
</html>
