
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#2563eb" />
    <title>PlumbStock Pro</title>
    <link rel="manifest" href="/manifest.json" />
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Register service worker for PWA functionality
    if ('serviceWorker' in navigator) {
      const isLocalDevHost = ['localhost', '127.0.0.1'].includes(window.location.hostname);

      window.addEventListener('load', () => {
        if (isLocalDevHost) {
          Promise.all([
            navigator.serviceWorker.getRegistrations(),
            'caches' in window ? caches.keys() : Promise.resolve([])
          ])
            .then(async ([registrations, cacheNames]) => {
              await Promise.all(registrations.map((registration) => registration.unregister()));
              await Promise.all(
                cacheNames
                  .filter((cacheName) => cacheName.startsWith('plumbpro-'))
                  .map((cacheName) => caches.delete(cacheName))
              );
              console.log('Local dev detected. Cleared PlumbPro service workers and caches.');
            })
            .catch((error) => {
              console.log('Failed to clear local service worker cache:', error);
            });

          return;
        }

        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('Service Worker registered successfully:', registration.scope);
          })
          .catch(error => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }

    // Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('App can be installed');
    });
  </script>
</body>
</html>
